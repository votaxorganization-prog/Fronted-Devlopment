<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!--Anchor tag-->

    <!--Basic power -->
    <!--href => Hypertext reference (attributes) Main Purpose => Destination(place) set karna-->
    <!--Link bnana pages mai-->
    <!--default behavior _self means same tab mai open hona hai -->
    <a href="https://beggar-free-project-1442026.onrender.com"
      >Beggar Free Project</a
    >

    <!--target (attribute) => _blank(new tab)-->
    <a href="https://www.youtube.com/" target="_blank">Youtube</a>

    <!--target (attribute) => _self(same tab)-->
    <a href="https://github.com/votaxorganization-prog" target="_self"
      >Github Profile</a
    >

    <!--parent (current tab) && top same working as _self(property)-->
    <a href="https://github.com/votaxorganization-prog" target="_parent">GGG</a>
    <a href="https://www.youtube.com/" target="_top">hjh</a>

    <!--Tooltip(work) ==> title(attribute)-->
    <a href="https://www.youtube.com/" title="Go to Youtube">Youtube</a>

    <!--file download-->
    <a
      href="/css/Css Expert Phase By Phase Master Guide.pdf"
      >Download file</a
    >

    <!--Linked file type -->
    <a
      href="/css/Css Expert Phase By Phase Master Guide.pdf"
      type="application/pdf"
      >Download file</a    >
  </body>
</html>
